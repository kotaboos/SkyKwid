<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyKwid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- бар -->
        <div id="titlebar">
            <div class="titlebar-left">
                <div class="titlebar-brand">
                    <img src="images/icon.png" alt="SkyKwid" class="brand-icon">
                    <span class="brand-name">SkyKwid</span>
                </div>
                <div class="titlebar-tab active" data-view="player" data-icon="🎵" onclick="switchView('player')">🎵 Плеер</div>
                <div class="titlebar-tab" data-view="playlist" data-icon="📋" onclick="switchView('playlist')">📋 Плейлист</div>
            </div>
            <div class="titlebar-right">
                <div class="titlebar-tab" data-view="settings" data-icon="⚙️" onclick="switchView('settings')">⚙️</div>
                <div class="window-btn" onclick="windowMinimize()">─</div>
                <div class="window-btn" onclick="windowMaximize()">☐</div>
                <div class="window-btn close-btn" onclick="windowClose()">✕</div>
            </div>
        </div>

        <!-- плеер -->
        <div class="player-content">
            <div class="player">
                <div class="title" id="songTitle">Нет трека</div>
                <div class="artist" id="artistName">—</div>
                <div class="progress-container" id="progressContainer"><div class="progress" id="progress"></div></div>
                <div class="time"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
                <div class="controls">
                    <button id="prevBtn">⏮</button>
                    <button id="playBtn">▶</button>
                    <button id="nextBtn">⏭</button>
                </div>
                <div class="volume"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="80"></div>
                <div class="playlist" id="playlistContainer"></div>
                <div class="status" id="status">Загрузка...</div>
            </div>
        </div>

        <!-- плейлист -->
        <div class="playlist-content" style="display: none;">
            <h2 style="color: white; padding: 20px; text-align: center;">Тут будет большой список песен</h2>
        </div>

        <!-- настройки -->
         <div class="content-page" id="settingsView" style="display: none;">
            <div class="player" style="max-width: 500px; width: 90%; text-align: left;">
                <h2 style="color: #eee; margin-bottom: 25px; text-align: center; font-weight: 400; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 15px;">⚙️ Настройки</h2>
                
                <!-- тема -->
                <div style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px;">
                    <label style="color: #ccc; font-size: 15px; cursor: pointer;">🎨 Тема</label>
                    <select id="themeSelect" style="padding: 6px 12px; border-radius: 8px; background: #1a1a2e; color: white; border: 1px solid #2a2a4a; font-size: 14px; cursor: pointer; outline: none;">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                        <option value="glass">Стеклянная</option>
                    </select>
                </div>
                
                <!-- автовоспроизведение -->
                <div style="margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px;">
                    <label style="color: #aaa; display: block; margin-bottom: 5px;">▶️ Автовоспроизведение при запуске</label>
                    <label class="switch">
                        <input type="checkbox" id="autoPlayCheck" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <button onclick="saveSettings()" style="background: #e94560; border: none; color: white; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; transition: 0.2s; letter-spacing: 0.5px;">Сохранить настройки</button>
                <div id="settingsStatus" style="margin-top: 12px; color: #888; text-align: center; font-size: 13px;"></div>
            </div>
    </div>
    
    <script>
        const { ipcRenderer } = require('electron');
        let playlist = [], currentIndex = 0, isPlaying = false;
        const audio = new Audio();

        ipcRenderer.invoke('get-songs').then(songs => {
            playlist = songs;
            if (playlist.length > 0) {
                renderPlaylist();
                loadTrack(0);
                statusEl.textContent = 'Готов к воспроизведению';
            } else {
                statusEl.textContent = '❌ Нет MP3 в папке music';
            }
        });

        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const songTitleEl = document.getElementById('songTitle');
        const artistNameEl = document.getElementById('artistName');
        const statusEl = document.getElementById('status');
        const playlistContainer = document.getElementById('playlistContainer');

        function loadTrack(index) {
            const track = playlist[index];
            if (!track) return;
            audio.src = track.file;
            songTitleEl.textContent = track.title;
            artistNameEl.textContent = track.artist;
            progress.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            totalTimeEl.textContent = '0:00';
            renderPlaylist();
        }

        function togglePlay() {
            if (playlist.length === 0) return;
            if (audio.src === '') loadTrack(currentIndex);
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                statusEl.textContent = '⏸ На паузе';
            } else {
                audio.play().catch(() => statusEl.textContent = '❌ Ошибка файла');
                playBtn.textContent = '⏸';
                statusEl.textContent = '▶ ' + playlist[currentIndex].title;
            }
            isPlaying = !isPlaying;
        }

        function prevTrack() { if (playlist.length === 0) return; currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; loadTrack(currentIndex); if (isPlaying) audio.play(); }
        function nextTrack() { if (playlist.length === 0) return; currentIndex = (currentIndex + 1) % playlist.length; loadTrack(currentIndex); if (isPlaying) audio.play(); }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'playlist-item' + (index === currentIndex ? ' active' : '');
                div.textContent = track.title + ' — ' + track.artist;
                div.onclick = () => { currentIndex = index; loadTrack(currentIndex); if (isPlaying) audio.play(); };
                playlistContainer.appendChild(div);
            });
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
                let m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
                currentTimeEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
                let tm = Math.floor(audio.duration / 60), ts = Math.floor(audio.duration % 60);
                totalTimeEl.textContent = tm + ':' + (ts < 10 ? '0' : '') + ts;
            }
        });
        audio.addEventListener('ended', nextTrack);
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) audio.currentTime = percent * audio.duration;
        });
        volumeSlider.addEventListener('input', () => audio.volume = volumeSlider.value / 100);

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(); } });

        // переключение вкладок
        function switchView(view) {
            document.querySelectorAll('.titlebar-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTab = document.querySelector(`.titlebar-tab[data-view="${view}"]`);
            if (activeTab) activeTab.classList.add('active');

            const playerContent = document.querySelector('.player-content');
            const playlistContent = document.querySelector('.playlist-content');

            document.querySelectorAll('.content-page').forEach(page => page.style.display = 'none');

            if (view === 'player') {
                // показываем плеер
                playerContent.style.display = 'flex';
                playlistContent.style.display = 'none';

                // убираем и возвращаем класс
                const player = document.querySelector('.player');
                if (player) {
                    player.classList.remove('player');
                    void player.offsetHeight;
                    player.classList.add('player');
                }

                // доп пересчёт через 100 мс
                setTimeout(() => {
                    if (playerContent) {
                        playerContent.style.display = 'none';
                        void playerContent.offsetHeight;
                        playerContent.style.display = 'flex';
                    }
                }, 100);

            } else if (view === 'playlist') {
                playerContent.style.display = 'none';
                playlistContent.style.display = 'flex';
            } else if (view === 'settings') {
                playerContent.style.display = 'none';
                playlistContent.style.display = 'none';
                document.getElementById('settingsView').style.display = 'flex';
                loadSettings();
            }
        }

        function windowMinimize() {
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('window-minimize');
        }
        function windowMaximize() {
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('window-maximize');
        }
        function windowClose() {
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('window-close');
        }

        window.addEventListener('resize', () => {
            const player = document.querySelector('.player');
            if (player && document.querySelector('.player-content').style.display !== 'none') {
                player.style.transform = 'scale(0.99)';
                requestAnimationFrame(() => {
                    player.style.transform = 'scale(1)';
                });
            }
        });
    </script>
</body>
</html>
