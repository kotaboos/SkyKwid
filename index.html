<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyKwid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- бар -->
        <div id="titlebar">
            <div class="titlebar-left">
                <div class="titlebar-brand">
                    <img src="images/icon.png" alt="SkyKwid" class="brand-icon">
                    <span class="brand-name">SkyKwid</span>
                </div>
                <div class="titlebar-tab active" data-view="player" data-icon="♫" onclick="switchView('player')">Плеер</div>
                <div class="titlebar-tab" data-view="playlist" data-icon="&#8801;" onclick="switchView('playlist')">Плейлист</div>
            </div>
            <div class="titlebar-right">
                <div class="titlebar-tab" data-view="settings" data-icon="&#9881;" onclick="switchView('settings')">&#9881;</div>
                <div class="window-btn" onclick="windowMinimize()">─</div>
                <div class="window-btn" onclick="windowMaximize()">☐</div>
                <div class="window-btn close-btn" onclick="windowClose()">✕</div>
            </div>
        </div>

        <!-- плеер -->
        <div class="player-content">
            <div class="player">
                <div class="title" id="songTitle">Нет трека</div>
                <div class="artist" id="artistName">—</div>
                <div class="progress-container" id="progressContainer"><div class="progress" id="progress"></div></div>
                <div class="time"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
                <div class="controls">
                    <button id="prevBtn">&#xf04a;</button>
                    <button id="playBtn">&#xf04b;</button>
                    <button id="nextBtn">&#xf04e;</button>
                </div>
                <div class="volume"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="80"></div>
                <div class="playlist" id="playlistContainer"></div>
                <div class="status" id="status">Загрузка...</div>
            </div>
        </div>

        <!-- плейлист -->
        <div class="playlist-content" style="display: none;">
            <div class="playlist-card" >
                <div class="playlist-list" id="playlistsList">
                    <p class="empty-playlist">Пока нет плейлистов. Создайте первый!</p>
                </div>
                <button class="btn-primary btn-full" onclick="createPlaylist()">Создать плейлист из папки</button>
                <button class="btn-secondary btn-full" onclick="addFilesToPlaylist()">Добавить файлы в плейлист</button>
            </div>
        </div>

        <!-- настройки -->
         <div class="content-page" id="settingsView" style="display: none;">
            <div class="setting-card">
                <h2 class="setting-title">⚙️ Настройки</h2>
                
                <!-- тема -->
                <div class="setting-row">
                    <label class="setting-label">🎨 Тема</label>
                    <select class="setting-select" id="themeSelect">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                        <option value="glass">Стеклянная</option>
                    </select>
                </div>
                
                <!-- автовоспроизведение -->
                <div class="setting-row">
                    <label class="setting-label">▶️ Автовоспроизведение при запуске</label>
                    <label class="switch">
                        <input type="checkbox" id="autoPlayCheck" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn-primary btn-full" onclick="saveSettings()">Сохранить настройки</button>
                <div class="settings-status" id="settingsStatus"></div>
            </div>
    </div>
    <script src="renderer.js"></script>
    <!-- модальное окно для ввода названия -->
    <div class="modal-overlay" id="modal" style="display: none;">
        <div class="modal-box">
            <h3 class="modal-title">Введите название плейлиста</h3>
            <input class="modal-input" type="text" id="modalInput" placeholder="Название...">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-confirm" id="modalConfirmBtn">Создать</button>
            </div>
        </div>
    </div>
    <!-- модалка для уведомлений -->
    <div class="toast" id="toast" style="display: none;">
        <span id="toastMessage"></span>
    </div>
    <!-- модалка для подтверждения -->
    <div class="modal-overlay" id="confirmModal" style="display: none;">
        <div class="modal-box">
            <p class="modal-confirm-text" id="confirmMessage">Вы уверены?</p>
            <div class="modal-actions" style="justify-content: center;">
                <button class="btn-cancel" onclick="confirmResponse(false)" >Отмена</button>
                <button class="btn-danger" onclick="confirmResponse(true)" >Удалить</button>
            </div>
        </div>
    </div>
</body>
</html>
